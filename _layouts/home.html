---
layout: base
---
<div class="flex justify-center py-8">
  <article class="text-center prose prose-p:font-extralight prose-slate dark:prose-invert primary-underline">
    {{ content }}
  </article>
</div>

<div class="w-full px-4 md:w-4/5 mx-auto mb-10">
  <div class="grid grid-cols-2 md:grid-cols-3 gap-4 md:gap-6">
    {% assign sorted_posts = site.posts | sort: 'date' | reverse %}
    {% for post in sorted_posts %}
    <div class="mb-6 overflow-hidden">
      <div class="hover:underline hover:decoration-2 hover:underline-offset-4 transition ease-in-out delay-150 hover:-translate-y-1 duration-300">
        <a href="{{ post.url | relative_url }}" class="block">
          <div class="overflow-hidden">
            <img src="{{ post.image | relative_url }}" alt="" class="w-full h-auto shadow-md hover:scale-105 transition-transform duration-300">
          </div>
          <h2 class="text-lg md:text-xl lg:text-2xl pt-5 text-ellipsis overflow-hidden">{{ post.title }}</h2>
        </a>
      </div>
    </div>
    {% endfor %}
  </div>
</div>

<style>
  .grid {
    display: grid !important;
    grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
  }
  @media (min-width: 768px) {
    .grid {
      grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
    }
  }
</style>
