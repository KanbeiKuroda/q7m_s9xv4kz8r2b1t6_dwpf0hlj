name: Manual Sitemap Generator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_update_sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Detect new posts since last commit
        id: check_posts
        run: |
          NEW_POSTS=$(git diff --name-only HEAD~1 HEAD | grep "^_posts/")
          echo "Detected changes: $NEW_POSTS"
          echo "changed_files=$NEW_POSTS" >> $GITHUB_OUTPUT

      - name: Exit if no new posts
        if: steps.check_posts.outputs.changed_files == ''
        run: |
          echo "No new posts detected. Exiting."
          exit 0

      - name: Build the Jekyll site
        run: bundle exec jekyll build

      - name: Copy generated sitemap to repo root
        run: cp _site/sitemap.xml sitemap.xml

      - name: Check if sitemap has changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          if git diff --quiet sitemap.xml; then
            echo "No sitemap changes detected."
            exit 0
          else
            echo "Sitemap has changed – committing."
          fi

      - name: Commit and push new sitemap.xml
        run: |
          git add sitemap.xml
          git commit -m "Auto-update sitemap.xml due to new post(s)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
