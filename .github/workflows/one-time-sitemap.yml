name: Manual Sitemap Generator

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build_and_update_sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'
          bundler-cache: true

      - name: Build the Jekyll site
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Overwrite sitemap.xml in repo root
        run: |
          cp _site/sitemap.xml sitemap.xml
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Check if sitemap.xml changed and commit
        run: |
          if ! git diff --quiet sitemap.xml; then
            git add sitemap.xml
            git commit -m "Update sitemap.xml with new URLs"
            git push
          else
            echo "No sitemap changes detected. Skipping commit."
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
